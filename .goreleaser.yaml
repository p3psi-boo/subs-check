version: 2

before:
  hooks:
    - go mod tidy

release:
  # 自动检测是否为预发布版本
  prerelease: auto

# 变更日志配置 (新增部分)
changelog:
  # 排序方式：asc (旧->新) 或 desc (新->旧)
  sort: asc
  # 使用 github 自动链接 issue 和处理贡献者
  use: github
  # 过滤掉不需要显示在日志中的提交
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^style:"
      - "^Merge pull request"
      - "^Merge branch"
      - "go mod tidy"
  # 格式
  format: "{{.SHA}}: {{.Message}}"
  # 提交分组配置
  groups:
    - title: "✨ 新功能"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "🐛 Bug 修复"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: "🚀 性能优化"
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 2
    - title: "🔧 维护与重构"
      regexp: "^.*(chore|refactor|build|ci)[(\\w)]*:+.*$"
      order: 3
    - title: "📝 文档"
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 4
    - title: "其他"
      order: 999

# 构建配置
builds:
  - id: subs-check
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=greenteagc,jsonv2
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{ .Version }} -X main.CurrentCommit={{ .ShortCommit }}

# 归档配置
archives:
  - ids:
      - subs-check
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else if eq .Arch "arm" }}armv7
      {{- else }}{{ .Arch }}{{ end }}
